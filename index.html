<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ ERP Control Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #f4f4f7);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #8e8e93);
            --accent: var(--tg-theme-button-color, #007aff);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 16px 16px 90px 16px; /* Espaço para a barra inferior */
            margin: 0;
        }

        /* Sistema de Abas */
        .tela { display: none; animation: fadeIn 0.2s ease; }
        .tela.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; font-weight: 700; }

        /* Formulários e Inputs estilo iOS */
        .input-group { background-color: var(--card-bg); padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .input-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--hint); margin-bottom: 4px; }
        .input-group input, .input-group textarea { width: 100%; border: none; background: transparent; color: var(--text); font-size: 16px; outline: none; font-family: inherit; }

        .btn-acao { width: 100%; padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        /* Barra de Abas Fixa Inferior */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid rgba(0,0,0,0.08); box-shadow: 0 -4px 15px rgba(0,0,0,0.03); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--hint); font-size: 11px; font-weight: 600; cursor: pointer; background: none; border: none; width: 25%; }
        .tab-item .icon { font-size: 24px; margin-bottom: 4px; }
        .tab-item.active { color: var(--accent); }

        /* Resultados internos (Busca) */
        .lista-resultados { margin-top: 15px; }
        .item-resultado { background-color: var(--card-bg); padding: 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.6; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="tela-cadastro" class="tela ativa">
        <div class="header"><h2>🏬 Nova Loja</h2></div>
        <div class="input-group"><label>Nome da Loja</label><input type="text" id="l_nome" placeholder="Ex: Decora Móveis"></div>
        <div class="input-group"><label>Vendedor</label><input type="text" id="l_vend" placeholder="Ex: Roberto Silva"></div>
        <div class="input-group"><label>WhatsApp</label><input type="tel" id="l_whats" placeholder="(62) 99999-9999" oninput="mascaraTelefone(this)"></div>
        <div class="input-group"><label>Fixo Loja</label><input type="tel" id="l_tel_loja" placeholder="(62) 3333-4444" oninput="mascaraTelefone(this)"></div>
        <button class="btn-acao" onclick="enviarLoja()">💾 Salvar Loja</button>
    </div>

    <div id="tela-aniv" class="tela">
        <div class="header"><h2>🎂 Lançar Aniversariante</h2></div>
        <div class="input-group"><label>Nome Completo</label><input type="text" id="a_nome" placeholder="Ex: Carlos Andrade"></div>
        <div class="input-group"><label>Data de Nasc.</label><input type="text" id="a_data" placeholder="DD/MM/AAAA" oninput="mascaraData(this)"></div>
        <div class="input-group"><label>Celular</label><input type="tel" id="a_cel" placeholder="(62) 99999-9999" oninput="mascaraTelefone(this)"></div>
        <button class="btn-acao" onclick="enviarAniv()">💾 Gravar Aniversário</button>
    </div>

    <div id="tela-os" class="tela">
        <div class="header"><h2>💼 Bloco de Notas O.S.</h2></div>
        <div class="input-group"><label>Nome do Serviço</label><input type="text" id="o_nome" placeholder="Ex: matriz, bico, afiação"></div>
        <div class="input-group"><label>Detalhes Técnicos</label><textarea id="o_desc" rows="4" placeholder="Ex: fazer completa..."></textarea></div>
        <button class="btn-acao" onclick="enviarOS()">💾 Salvar Nota</button>
    </div>

    <div id="tela-busca" class="tela">
        <div class="header"><h2>🔍 Consulta Inteligente</h2></div>
        <div class="input-group"><label>Digite o termo</label><input type="text" id="campo-busca" placeholder="Nome, Loja ou Vendedor" oninput="executarBuscaInterna(this.value)"></div>
        <div id="container-resultados" class="lista-resultados"></div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" onclick="mudarAba('tela-cadastro', this)"><div class="icon">🏬</div><div>Lojas</div></button>
        <button class="tab-item" onclick="mudarAba('tela-aniv', this)"><div class="icon">🎂</div><div>Aniv.</div></button>
        <button class="tab-item" onclick="mudarAba('tela-os', this)"><div class="icon">💼</div><div>O.S.</div></button>
        <button class="tab-item" onclick="mudarAba('tela-busca', this)"><div class="icon">🔍</div><div>Buscar</div></button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 🚨 MUDE AQUI PARA O SEU NO-IP
        const API_URL = "https://api.gouveiahub.com.br";

        function mudarAba(idTela, botao) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            document.getElementById(idTela).classList.add('ativa');
            botao.classList.add('active');
        }

        function mascaraTelefone(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 11) v = v.slice(0, 11); 
            if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');   
            else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            else if (v.length > 0) v = v.replace(/^(\d*)/, '($1');
            input.value = v; 
        }

        function mascaraData(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v.length > 8) v = v.slice(0, 8); 
            if (v.length > 4) v = v.replace(/^(\d{2})(\d{2})(\d{0,4}).*/, '$1/$2/$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,2})/, '$1/$2');
            input.value = v; 
        }

        async function executarBuscaInterna(termo) {
            let container = document.getElementById('container-resultados');
            if (termo.length < 2) { container.innerHTML = ""; return; }

            try {
                let response = await fetch(`${API_URL}/api/buscar?query=${encodeURIComponent(termo)}`);
                let resultados = await response.json();
                
                container.innerHTML = "";
                if (resultados.length === 0) {
                    container.innerHTML = "<div class='item-resultado'>❌ Nada encontrado.</div>"; return;
                }

                resultados.forEach(item => {
                    let htmlItem = `<div class='item-resultado'>`;
                    if (item.tipo === "loja") {
                        htmlItem += `<b>🏬 Loja:</b> ${item.loja}<br>🧑‍💼 Vend: ${item.vendedor}<br>📞 Tel: ${item.whatsapp}<br>📱 <a href="${item.link_zap}">Chamar no WhatsApp</a>`;
                    } else {
                        htmlItem += `<b>👤 Nome:</b> ${item.nome}<br>📅 Nasc: ${item.data} (${item.idade} anos)<br>📱 <a href="${item.link_zap}">Chamar no WhatsApp</a>`;
                    }
                    htmlItem += `</div>`;
                    container.innerHTML += htmlItem;
                });
            } catch (e) {
                container.innerHTML = "<div class='item-resultado'>⚠️ Erro de conexão com o TrueNAS. Verifique o No-IP ou a porta 8000.</div>";
            }
        }

        async function fazerEnvioAPI(endpoint, payload) {
            try {
                tg.MainButton.showProgress(); // Mostra carregando no Telegram
                let response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                let res = await response.json();
                tg.MainButton.hideProgress();
                
                if(res.status === "success") {
                    tg.showAlert("✅ Salvo com sucesso!");
                    document.querySelectorAll('input, textarea').forEach(i => i.value = ""); // Limpa tela
                } else {
                    tg.showAlert("❌ Erro interno ao salvar.");
                }
            } catch(e) {
                tg.MainButton.hideProgress();
                tg.showAlert("❌ Falha de comunicação com o servidor TrueNAS.");
            }
        }

        function enviarLoja() {
            let loja = document.getElementById('l_nome').value.trim();
            let vend = document.getElementById('l_vend').value.trim();
            let whats = document.getElementById('l_whats').value.trim();
            let telLoja = document.getElementById('l_tel_loja').value.trim();
            if(!loja || !vend || !whats) return tg.showAlert("⚠️ Preencha Nome, Vendedor e WhatsApp!");
            fazerEnvioAPI('/api/nova_loja', { loja, vendedor: vend, whatsapp: whats, telefone_loja: telLoja });
        }

        function enviarAniv() {
            let nome = document.getElementById('a_nome').value.trim();
            let data = document.getElementById('a_data').value.trim();
            let cel = document.getElementById('a_cel').value.trim();
            if(!nome || !data.includes('/')) return tg.showAlert("⚠️ Preencha Nome e Data!");
            fazerEnvioAPI('/api/novo_aniv', { nome, data, celular_formatado: cel });
        }

        function enviarOS() {
            let nome = document.getElementById('o_nome').value.trim();
            let desc = document.getElementById('o_desc').value.trim();
            if(!nome || !desc) return tg.showAlert("⚠️ Preencha todos os campos!");
            fazerEnvioAPI('/api/nova_os', { nome, descricao: desc });
        }
    </script>
</body>
</html>
