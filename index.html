<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel ERP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
            text-align: center;
        }
        h2 { margin-bottom: 5px; }
        p { color: var(--tg-theme-hint-color, #888); font-size: 14px; margin-bottom: 25px; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 20px 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--tg-theme-hint-color, #eee);
        }
        
        .card:active { transform: scale(0.95); }
        .card h3 { margin: 10px 0 0 0; font-size: 16px; color: var(--tg-theme-text-color, #333); }
        .icon { font-size: 32px; }

        /* Botão largo para ações principais */
        .card.full { grid-column: span 2; background-color: var(--tg-theme-button-color, #3390ec); color: white;}
        .card.full h3 { color: white; }
    </style>
</head>
<body>

    <h2>⚡ ERP System</h2>
    <p>Selecione o módulo que deseja acessar</p>

    <div class="menu-grid">
        <div class="card" onclick="tg.showAlert('Módulo em construção!')">
            <div class="icon">🏬</div>
            <h3>Nova Loja</h3>
        </div>

        <div class="card" onclick="tg.showAlert('Módulo em construção!')">
            <div class="icon">🎂</div>
            <h3>Aniversário</h3>
        </div>

        <div class="card" onclick="tg.showAlert('Módulo em construção!')">
            <div class="icon">💼</div>
            <h3>Nova O.S.</h3>
        </div>

        <div class="card" onclick="tg.showAlert('Módulo em construção!')">
            <div class="icon">📊</div>
            <h3>Relatórios</h3>
        </div>

        <div class="card full" onclick="fecharApp()">
            <div class="icon">❌</div>
            <h3>Fechar Painel</h3>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function fecharApp() {
            tg.close();
        }
    </script>
</body>
</html>
