<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel ERP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        h2 { text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--tg-theme-hint-color, #888); font-size: 14px; margin-bottom: 25px; }
        
        /* Ocultar as telas inativas */
        .tela { display: none; animation: fadeIn 0.3s ease; }
        .tela.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos do Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background-color: var(--tg-theme-secondary-bg-color, #ffffff); padding: 20px 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; text-align: center; border: 1px solid var(--tg-theme-hint-color, #eee); }
        .card:active { transform: scale(0.95); }
        .card h3 { margin: 10px 0 0 0; font-size: 15px; color: var(--tg-theme-text-color, #333); }
        .icon { font-size: 32px; }
        .card.full { grid-column: span 2; background-color: #ff3b30; color: white; border: none; }
        .card.full h3 { color: white; }

        /* Estilos dos Formulários */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: var(--tg-theme-hint-color, #888); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--tg-theme-hint-color, #ccc); border-radius: 8px; background-color: var(--tg-theme-secondary-bg-color, #ffffff); color: var(--tg-theme-text-color, #000); font-size: 16px; box-sizing: border-box; }
        .btn-salvar { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-voltar { width: 100%; padding: 15px; background-color: transparent; color: var(--tg-theme-button-color, #3390ec); border: 1px solid var(--tg-theme-button-color, #3390ec); border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="tela-menu" class="tela ativa">
        <h2>⚡ ERP System</h2>
        <p class="subtitle">Selecione o módulo que deseja acessar</p>
        <div class="menu-grid">
            <div class="card" onclick="abrirTela('tela-loja')"><div class="icon">🏬</div><h3>Nova Loja</h3></div>
            <div class="card" onclick="abrirTela('tela-aniv')"><div class="icon">🎂</div><h3>Aniversário</h3></div>
            <div class="card" onclick="abrirTela('tela-os')"><div class="icon">💼</div><h3>Nova O.S.</h3></div>
            <div class="card" onclick="tg.showAlert('Acesse os relatórios diretamente pelo botão do Menu no chat do bot.')"><div class="icon">📊</div><h3>Relatórios</h3></div>
            <div class="card full" onclick="tg.close()"><div class="icon">✖️</div><h3>Fechar</h3></div>
        </div>
    </div>

    <div id="tela-loja" class="tela">
        <h2>🏬 Nova Loja</h2>
        <div class="input-group"><label>Loja</label><input type="text" id="l_nome" placeholder="Ex: Decora Móveis"></div>
        <div class="input-group"><label>Vendedor</label><input type="text" id="l_vend" placeholder="Ex: Roberto Silva"></div>
        <div class="input-group"><label>Ramal (Opcional)</label><input type="number" id="l_ramal" placeholder="Ex: 105"></div>
        <div class="input-group"><label>Celular c/ DDD</label><input type="tel" id="l_cel" placeholder="Ex: 11988887777"></div>
        <button class="btn-salvar" onclick="enviarLoja()">💾 Salvar Loja</button>
        <button class="btn-voltar" onclick="abrirTela('tela-menu')">◀️ Voltar</button>
    </div>

    <div id="tela-aniv" class="tela">
        <h2>🎂 Novo Aniversariante</h2>
        <div class="input-group"><label>Nome Completo</label><input type="text" id="a_nome" placeholder="Ex: Carlos Andrade"></div>
        <div class="input-group"><label>Data de Nascimento</label><input type="text" id="a_data" placeholder="DD/MM/AAAA"></div>
        <div class="input-group"><label>Celular c/ DDD (Opcional)</label><input type="tel" id="a_cel" placeholder="Ex: 11988887777"></div>
        <button class="btn-salvar" onclick="enviarAniv()">💾 Salvar Aniversário</button>
        <button class="btn-voltar" onclick="abrirTela('tela-menu')">◀️ Voltar</button>
    </div>

    <div id="tela-os" class="tela">
        <h2>💼 Nova Ordem de Serviço</h2>
        <div class="input-group"><label>Nome do Cliente</label><input type="text" id="o_nome" placeholder="Ex: Maria Souza"></div>
        <div class="input-group"><label>Descrição do Serviço</label><textarea id="o_desc" rows="3" placeholder="Ex: Conserto de estofado..."></textarea></div>
        <button class="btn-salvar" onclick="enviarOS()">💾 Criar O.S.</button>
        <button class="btn-voltar" onclick="abrirTela('tela-menu')">◀️ Voltar</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Função de navegação entre as telas do App
        function abrirTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        // Função de Envio: Loja
        function enviarLoja() {
            let loja = document.getElementById('l_nome').value.trim();
            let vend = document.getElementById('l_vend').value.trim();
            if(!loja || !vend) return tg.showAlert("⚠️ Preencha a Loja e o Vendedor!");
            
            tg.sendData(JSON.stringify({
                tipo: "nova_loja", loja: loja, vendedor: vend,
                ramal: document.getElementById('l_ramal').value.trim() || "--",
                celular: document.getElementById('l_cel').value.trim()
            }));
            tg.close();
        }

        // Função de Envio: Aniversário
        function enviarAniv() {
            let nome = document.getElementById('a_nome').value.trim();
            let data = document.getElementById('a_data').value.trim();
            if(!nome || !data.includes('/')) return tg.showAlert("⚠️ Preencha o nome e a data corretamente (DD/MM/AAAA)!");
            
            tg.sendData(JSON.stringify({
                tipo: "novo_aniv", nome: nome, data: data,
                celular: document.getElementById('a_cel').value.trim()
            }));
            tg.close();
        }

        // Função de Envio: O.S.
        function enviarOS() {
            let nome = document.getElementById('o_nome').value.trim();
            let desc = document.getElementById('o_desc').value.trim();
            if(!nome || !desc) return tg.showAlert("⚠️ Preencha o Cliente e a Descrição!");
            
            tg.sendData(JSON.stringify({ tipo: "nova_os", nome: nome, descricao: desc }));
            tg.close();
        }
    </script>
</body>
</html>
